apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crab

resources:
  - ../../base
  - filebeat-daemonset.yaml
  - logstash-deployment.yaml
  - logstash-service.yaml

configMapGenerator:
- name: crabserver
  behavior: merge
  files:
    - config.py=config/config.py
- name: filebeat-crab-config
  files:
    - config/filebeat.yml
  options:
    disableNameSuffixHash: false
- name: logstash
  files:
    - config/logstash.conf
    - config/logstash.yml
  options:
    disableNameSuffixHash: false

labels:
  - pairs:
      env: k8s-preprod
    includeTemplates: true

patches:
  - path: patches/cm-filebeat-label.yaml
    target:
      kind: ConfigMap
      name: filebeat-crab-config
  - path: patches/crabserver-probes.yaml
    target:
      kind: Deployment
      name: crabserver
  - path: patches/crabserver-image.yaml
    target:
      kind: Deployment
      name: crabserver
